name: QA Lighthouse CI

on:
  pull_request:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          NEXT_PUBLIC_SITE_URL: https://welovedaily.com
        run: npm run build

      - name: Start app
        env:
          NEXT_PUBLIC_SITE_URL: https://welovedaily.com
        run: |
          npm run start -- --hostname 127.0.0.1 --port 3000 > /tmp/next.log 2>&1 &
          echo $! > /tmp/next.pid

      - name: Wait for app
        run: node scripts/wait-for-url.mjs http://127.0.0.1:3000

      - name: Resolve project detail path for LHCI
        run: |
          PROJECT_DETAIL_URL=$(node --input-type=module -e "
            const xml = await (await fetch('http://127.0.0.1:3000/sitemap.xml')).text()
            const matches = [...xml.matchAll(/<loc>(.*?)<\\/loc>/g)].map((m) => m[1])
            const project = matches.find((u) => /\\/projects\\//.test(u) && !u.endsWith('/projects'))
            console.log(project || 'http://127.0.0.1:3000/projects')
          ")
          echo "LHCI_PROJECT_DETAIL_URL=${PROJECT_DETAIL_URL}" >> "$GITHUB_ENV"

      - name: Run Lighthouse CI gate
        run: npx lhci autorun --config=./lighthouserc.cjs

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lhci-reports-${{ github.run_id }}
          path: .lighthouseci
          if-no-files-found: warn
          retention-days: 90

      - name: Stop app
        if: always()
        run: |
          if [ -f /tmp/next.pid ]; then kill "$(cat /tmp/next.pid)" || true; fi
          tail -n 200 /tmp/next.log || true
